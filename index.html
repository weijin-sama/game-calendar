<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>二游版本时间日历</title>

  <!-- FullCalendar CDN -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    #calendar {
      max-width: 900px;
      margin: 40px auto;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: white;
      width: 400px;
      margin: 10% auto;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      position: relative;
      animation: fadeIn 0.3s ease;
    }

    .close {
      position: absolute;
      right: 15px;
      top: 10px;
      font-size: 22px;
      cursor: pointer;
    }

    .close:hover {
      color: red;
    }

    #modalLink {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 12px;
      background: #3b82f6;
      color: white;
      border-radius: 6px;
      text-decoration: none;
    }

    #modalLink:hover {
      background: #2563eb;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<!-- 自定义弹窗 -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="closeBtn" class="close">&times;</span>
    <h2 id="modalTitle"></h2>
    <p><strong>类型：</strong><span id="modalType"></span></p>
    <p><strong>开始时间：</strong><span id="modalStart"></span></p>
    <p><strong>结束时间：</strong><span id="modalEnd"></span></p>
    <p id="modalDescription"></p>
    <a id="modalLink" href="#" target="_blank">查看官网</a>
  </div>
</div>

<body>

  <h1>二游版本时间日历</h1>
  <div style="text-align:center; margin-bottom:20px;">
    <button onclick="filterGame('all')">全部</button>
    <button onclick="filterGame('hsr')">崩坏星穹铁道</button>
    <button onclick="filterGame('arknights')">明日方舟</button>
    <button onclick="filterGame('wuthering')">鸣潮</button>
    <button onclick="filterGame('endfield')">明日方舟终末地</button>
  </div>

  <div id="calendar"></div>

  <script>
    let calendar;
    let allEvents = [];

    const typeColors = {
      version: "#3b82f6",
      banner: "#ef4444",
      event: "#10b981"
    };

    document.addEventListener('DOMContentLoaded', function () {
      var calendarEl = document.getElementById('calendar');

      fetch('events.json')
        .then(response => response.json())
        .then(data => {

          data.forEach(event => {
            event.color = typeColors[event.type] || "#888888";
          });

          allEvents = data;

          calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            events: allEvents,

            // 👇 关键：点击事件
            eventClick: function (info) {

              const modal = document.getElementById("modal");

              document.getElementById("modalTitle").innerText = info.event.title;
              document.getElementById("modalType").innerText = info.event.extendedProps.type;
              document.getElementById("modalStart").innerText = info.event.startStr;
              document.getElementById("modalEnd").innerText =
                info.event.endStr || "单日事件";

              document.getElementById("modalDescription").innerText =
                info.event.extendedProps.description || "无说明";

              const link = document.getElementById("modalLink");
              const url = info.event.extendedProps.url;

              if (url) {
                link.href = url;
                link.style.display = "inline-block";
              } else {
                link.style.display = "none";
              }

              modal.style.display = "block";
            }

          });

          calendar.render();
        });
    });
    // 点击关闭按钮
    document.getElementById("closeBtn").onclick = function () {
      document.getElementById("modal").style.display = "none";
    };

    // 点击外面关闭
    window.onclick = function (event) {
      const modal = document.getElementById("modal");
      if (event.target == modal) {
        modal.style.display = "none";
      }
    };
  </script>

</body>

</html>
