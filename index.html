<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>二游版本时间日历</title>

  <!-- FullCalendar CDN -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    #calendar {
      max-width: 900px;
      margin: 40px auto;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>二游版本时间日历</h1>
  <div style="text-align:center; margin-bottom:20px;">
    <button onclick="filterGame('all')">全部</button>
    <button onclick="filterGame('hsr')">星穹铁道</button>
    <button onclick="filterGame('arknights')">明日方舟</button>
    <button onclick="filterGame('wuthering')">鸣潮</button>
  </div>

  <div id="calendar"></div>

  <script>
    let calendar;
    let allEvents = [];

    document.addEventListener('DOMContentLoaded', function () {
      var calendarEl = document.getElementById('calendar');

      fetch('events.json')
        .then(response => response.json())
        .then(data => {
          allEvents = data;

          calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            events: allEvents
          });

          calendar.render();
        });
    });

    function filterGame(game) {
      if (game === 'all') {
        calendar.removeAllEvents();
        calendar.addEventSource(allEvents);
      } else {
        const filtered = allEvents.filter(event => event.game === game);
        calendar.removeAllEvents();
        calendar.addEventSource(filtered);
      }
    }
  </script>

</body>
</html>
