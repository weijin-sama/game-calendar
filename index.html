<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>二游版本时间日历</title>

  <!-- FullCalendar CDN -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    #calendar {
      max-width: 900px;
      margin: 40px auto;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>二游版本时间日历</h1>
  <div style="text-align:center; margin-bottom:20px;">
    <button onclick="filterGame('all')">全部</button>
    <button onclick="filterGame('hsr')">崩坏星穹铁道</button>
    <button onclick="filterGame('arknights')">明日方舟</button>
    <button onclick="filterGame('wuthering')">鸣潮</button>
    <button onclick="filterGame('endfield')">明日方舟终末地</button>
  </div>

  <div id="calendar"></div>

  <script>
    let calendar;
    let allEvents = [];

    const typeColors = {
      version: "#3b82f6",
      banner: "#ef4444",
      event: "#10b981"
    };

    document.addEventListener('DOMContentLoaded', function () {
      var calendarEl = document.getElementById('calendar');

      fetch('events.json')
        .then(response => response.json())
        .then(data => {

          data.forEach(event => {
            event.color = typeColors[event.type] || "#888888";
          });

          allEvents = data;

          calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            events: allEvents,

            // 👇 关键：点击事件
            eventClick: function (info) {

              let title = info.event.title;
              let start = info.event.startStr;
              let end = info.event.endStr || "单日事件";
              let description = info.event.extendedProps.description || "无说明";
              let url = info.event.extendedProps.url || "";

              alert(
                "📌 " + title + "\n\n" +
                "开始时间: " + start + "\n" +
                "结束时间: " + end + "\n\n" +
                description
              );

              if (url) {
                window.open(url, "_blank");
              }
            }

          });

          calendar.render();
        });
    });
  </script>

</body>

</html>
