<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>二游版本时间日历</title>

  <!-- FullCalendar CDN -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    #calendar {
      max-width: 900px;
      margin: 40px auto;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: white;
      width: 400px;
      margin: 10% auto;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      position: relative;
      animation: fadeIn 0.3s ease;
    }

    .close {
      position: absolute;
      right: 15px;
      top: 10px;
      font-size: 22px;
      cursor: pointer;
    }

    .close:hover {
      color: red;
    }

    #modalLink:hover {
      background: #2563eb;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<!-- 自定义弹窗 -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="closeBtn" class="close">&times;</span>

    <img id="gameIcon" style="width:40px; vertical-align:middle; margin-right:8px;">
    <h2 id="modalTitle" style="display:inline;"></h2>

    <br><br>

    <img id="characterImage" style="width:100%; border-radius:10px; margin-bottom:10px; display:none;">

    <p><strong>类型：</strong><span id="modalType"></span></p>
    <p><strong>开始时间：</strong><span id="modalStart"></span></p>
    <p><strong>结束时间：</strong><span id="modalEnd"></span></p>
    <p id="modalDescription"></p>
    <a id="modalLink" target="_blank">查看官网</a>
  </div>
</div>

<body>

  <h1>二游版本时间日历</h1>
  <div style="text-align:center; margin-bottom:20px;">
    <button onclick="filterGame('all')">全部</button>
    <button onclick="filterGame('hsr')">崩坏星穹铁道</button>
    <button onclick="filterGame('arknights')">明日方舟</button>
    <button onclick="filterGame('wuthering')">鸣潮</button>
    <button onclick="filterGame('endfield')">明日方舟终末地</button>
  </div>

  <div id="calendar"></div>

  <script>
    let calendar;
    let allEvents = [];

    const typeColors = {
      version: "#3b82f6",
      banner: "#ef4444",
      event: "#10b981"
    };

    document.addEventListener('DOMContentLoaded', function () {
      var calendarEl = document.getElementById('calendar');

      fetch('events.json')
        .then(response => response.json())
        .then(data => {

          let processedEvents = [];

          data.forEach(event => {

            const baseColor = typeColors[event.type] || "#888888";

            // 1️⃣ 卡池 —— 保持连续
            if (event.type === "banner") {

              const status = getEventStatus(event.end);

              let color = baseColor;

              if (status === "ended") {
                color = "#9ca3af"; // 灰色
              }
              else if (status === "endingSoon") {
                color = "#f59e0b"; // 橙色
              }

              event.color = color;
              processedEvents.push(event);
            }

            // 2️⃣ 活动 —— 开始 + 结束 两个点
            else if (event.type === "event") {

              const status = getEventStatus(event.end);

              let color = baseColor;

              if (status === "ended") {
                color = "#9ca3af";
              }
              else if (status === "endingSoon") {
                color = "#f59e0b";
              }

              // 开始标记
              processedEvents.push({
                title: event.title,
                start: event.start,
                color: color,
                extendedProps: event
              });

              if (event.end) {
                processedEvents.push({
                  title: event.title,
                  start: event.end,
                  color: color,
                  extendedProps: event
                });
              }
            }

            // 3️⃣ 新版本 —— 只显示开始
            else if (event.type === "version") {

              processedEvents.push({
                title: event.title,
                start: event.start,
                color: baseColor,
                extendedProps: event
              });
            }

          });

          allEvents = data;

          calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            displayEventTime: true,
            eventTimeFormat: {
              hour: '2-digit',
              minute: '2-digit',
              hour12: false
            },
            events: processedEvents,

            eventContent: function (arg) {

              const game = arg.event.extendedProps.game;

              const gameIcons = {
                hsr: "images/hsr.png",
                arknights: "images/arknights.png",
                wuthering: "images/wuthering.png",
                endfield: "images/endfield.png"
              };

              const iconUrl = gameIcons[game] || "";

              const container = document.createElement("div");
              container.style.display = "flex";
              container.style.alignItems = "center";
              container.style.fontSize = "12px";

              // 游戏图标
              if (iconUrl) {
                const img = document.createElement("img");
                img.src = iconUrl;
                img.style.width = "16px";
                img.style.height = "16px";
                img.style.marginRight = "4px";
                img.style.borderRadius = "4px";
                container.appendChild(img);
              }

              // 只写类型
              const text = document.createElement("span");

              const typeMap = {
                banner: "卡池",
                event: "活动",
                version: "版本"
              };

              const status = getEventStatus(arg.event.extendedProps.end);

              let label = typeMap[arg.event.extendedProps.type] || "";

              if (status === "endingSoon") {
                label = "⚠ " + label;
              }

              if (status === "ended") {
                label = "✔ " + label;
              }

              text.innerText = label;
              container.appendChild(text);

              return { domNodes: [container] };
            },

            // 👇 关键：点击事件
            eventClick: function (info) {

              let startDate;
              let endDate;

              // 如果是连续事件（如卡池）
              if (info.event.start && info.event.end) {
                startDate = info.event.start;
                endDate = info.event.end;
              }

              // 如果是拆分后的单日事件（如活动）
              else {
                const original = info.event.extendedProps;
                startDate = original.start ? new Date(original.start) : null;
                endDate = original.end ? new Date(original.end) : null;
              }

              document.getElementById("modalStart").innerText =
                startDate
                  ? formatDateTimeWithWeek(startDate)
                  : "无时间";

              document.getElementById("modalEnd").innerText =
                endDate
                  ? formatDateTimeWithWeek(endDate)
                  : "单日事件";

              document.getElementById("modalDescription").innerText =
                "剩余时间：" + getRemainingTime(endDate);

              const link = document.getElementById("modalLink");


              // 游戏图标映射
              const gameIcons = {
                hsr: "images/hsr.png",
                arknights: "images/arknights.png",
                wuthering: "images/wuthering.png",
                endfield: "images/endfield.png"
              };

              // 设置游戏图标
              const game = info.event.extendedProps.game;
              const icon = document.getElementById("gameIcon");
              icon.src = gameIcons[game] || "";

              const charImg = document.getElementById("characterImage");
              const characterImage = info.event.extendedProps.characterImage;

              if (characterImage) {
                charImg.src = characterImage;
                charImg.style.display = "block";
              } else {
                charImg.style.display = "none";
              }

              modal.style.display = "block";
            }

          });

          calendar.render();
        });
    });
    // 点击关闭按钮
    document.getElementById("closeBtn").onclick = function () {
      document.getElementById("modal").style.display = "none";
    };

    // 点击外面关闭
    window.onclick = function (event) {
      const modal = document.getElementById("modal");
      if (event.target == modal) {
        modal.style.display = "none";
      }
    };

    function formatDateTimeWithWeek(dateObj) {

      if (!dateObj) return "无时间";

      const date = new Date(dateObj);
      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");

      return `${year}-${month}-${day} ${hour}:${minute} (周${weekdays[date.getDay()]})`;
    }

    function getRemainingTime(endDate) {

      if (!endDate) return "无结束时间";

      const now = new Date();
      const diffMs = endDate - now;

      if (diffMs <= 0) return "已结束";

      const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
      const diffDays = Math.floor(diffHours / 24);
      const hoursLeft = diffHours % 24;

      return `${diffDays}天 ${hoursLeft}小时`;
    }

    function getEventStatus(endStr) {

      if (!endStr) return "normal";

      const now = new Date();
      const end = new Date(endStr);
      const diff = end - now;

      if (diff <= 0) return "ended";

      if (diff <= 24 * 60 * 60 * 1000) return "endingSoon";

      return "normal";
    }
  </script>

</body>

</html>
